name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # Create a directory for the app
            mkdir -p ~/snakegame
            
            # This is a simplified deployment that pulls the latest code
            cd ~/snakegame
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            # Stop any existing container
            docker stop web-snake || true
            docker rm web-snake || true
            
            # Build the new image
            docker build -t web-snake:latest .
            
            # Run the container on port 80
            docker run -d --name web-snake -p 80:80 web-snake:latest
