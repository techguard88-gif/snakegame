name: Deploy to GCP VM

on:
  push:
    branches:
      - main

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to GCP VM via Workload Identity Federation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM via gcloud ssh
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --tunnel-through-iap \
            --command="
              mkdir -p ~/snakegame &&
              cd ~/snakegame &&
              if [ -d '.git' ]; then
                git pull origin main
              else
                git clone https://github.com/${{ github.repository }}.git .
              fi &&
              sudo docker stop web-snake || true &&
              sudo docker rm web-snake || true &&
              sudo docker build -t web-snake:latest . &&
              sudo docker run -d --name web-snake -p 80:80 web-snake:latest
            "
