<!DOCTYPE html>
<html>
<head>
    <title>Web Snake Game</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin: 10px 0; }
        .score-board { font-size: 24px; margin-bottom: 20px; }
        canvas {
            background-color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            border: 2px solid #ecf0f1;
        }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    <div class="score-board">Score: <span id="score">0</span> | High Score: <span id="highScore">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x: 10, y: 10}];
        let velocity = {x: 0, y: 0};
        let apple = {x: 15, y: 15};
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        document.getElementById("highScore").innerText = highScore;

        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100); // Game speed
        }

        function update() {
            const head = {x: snake[0].x + velocity.x, y: snake[0].y + velocity.y};
            
            // Wall Collision
            if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                resetGame();
                return;
            }
            
            // Self Collision
            for(let i = 0; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y && (velocity.x !== 0 || velocity.y !== 0)) {
                    resetGame();
                    return;
                }
            }

            snake.unshift(head);

            // Apple Collision
            if(head.x === apple.x && head.y === apple.y) {
                score += 10;
                document.getElementById("score").innerText = score;
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    document.getElementById("highScore").innerText = highScore;
                }
                apple.x = Math.floor(Math.random() * tileCount);
                apple.y = Math.floor(Math.random() * tileCount);
            } else {
                snake.pop(); // Remove tail
            }
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "red";
            ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize - 2, gridSize - 2);

            ctx.fillStyle = "lime";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            velocity = {x: 0, y: 0};
            score = 0;
            document.getElementById("score").innerText = score;
        }

        window.addEventListener("keydown", e => {
            switch(e.key) {
                case "ArrowUp": case "w": case "W":
                    if(velocity.y !== 1) velocity = {x: 0, y: -1}; break;
                case "ArrowDown": case "s": case "S":
                    if(velocity.y !== -1) velocity = {x: 0, y: 1}; break;
                case "ArrowLeft": case "a": case "A":
                    if(velocity.x !== 1) velocity = {x: -1, y: 0}; break;
                case "ArrowRight": case "d": case "D":
                    if(velocity.x !== -1) velocity = {x: 1, y: 0}; break;
            }
        });

        gameLoop();
    </script>
</body>
</html>
